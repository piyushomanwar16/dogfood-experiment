<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawNutri | Premium Canine Nutrition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5E3C;
            --primary-light: #A67B5B;
            --accent: #D4A373;
            --bg-cream: #FAF7F2;
            --text-dark: #4A3728;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-cream); 
            color: var(--text-dark); 
            overflow-x: hidden;
        }

        /* Header & Navigation */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(250, 247, 242, 0.8);
            backdrop-filter: blur(10px);
        }
        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: var(--primary); 
            text-decoration: none;
        }
        .cart-trigger {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            border: none;
        }
        .cart-trigger:hover { background: var(--primary-light); }

        /* Hero Section */
        #hero-container {
            height: 100vh;
            width: 100%;
            position: relative;
            background: radial-gradient(circle, #fff 0%, #e8dfd5 100%);
        }
        .hero-overlay {
            position: absolute;
            top: 50%; left: 10%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 10;
            max-width: 500px;
        }
        .hero-overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            line-height: 1.1;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .hero-overlay p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8; }

        /* Products Section */
        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 80px 0 40px;
            color: var(--primary);
        }
        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 5%;
            margin-bottom: 100px;
        }
        .product-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: var(--transition);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-card:hover { transform: translateY(-10px); }
        .product-card h3 { margin-bottom: 15px; color: var(--text-dark); }
        .product-card p { font-size: 0.9rem; color: #777; margin-bottom: 20px; }
        .product-price { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary); 
            margin-bottom: 20px; 
        }
        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .add-btn:hover { background: var(--primary); }

        /* Cart Sidebar */
        #cart-sidebar {
            position: fixed;
            right: -400px; top: 0;
            width: 400px; height: 100vh;
            background: white;
            z-index: 2000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }
        #cart-sidebar.open { right: 0; }
        .cart-header { 
            display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 30px; 
        }
        .close-cart { cursor: pointer; font-size: 1.5rem; background: none; border: none; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { 
            width: 25px; height: 25px; border-radius: 50%; 
            border: 1px solid var(--primary); background: none; 
            cursor: pointer; 
        }
        .cart-footer { border-top: 2px solid var(--bg-cream); padding-top: 20px; }
        .total-row { 
            display: flex; justify-content: space-between; 
            font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; 
        }
        .checkout-btn {
            width: 100%; background: var(--primary);
            color: white; padding: 15px; border-radius: 10px;
            border: none; cursor: pointer; font-size: 1.1rem; font-weight: 600;
        }

        /* Checkout Modal */
        #checkout-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 12px;
            border: 1px solid #ddd; border-radius: 8px;
            font-family: inherit;
        }
        .submit-order-btn {
            width: 100%; background: var(--primary);
            color: white; padding: 15px; border-radius: 10px;
            border: none; cursor: pointer; font-size: 1.1rem;
        }

        #notification {
            position: fixed; top: 20px; right: 20px;
            background: #4CAF50; color: white;
            padding: 15px 30px; border-radius: 10px;
            z-index: 4000; display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @media (max-width: 768px) {
            #cart-sidebar { width: 100%; right: -100%; }
            .hero-overlay h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">PawNutri</a>
        <button class="cart-trigger" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
    </header>

    <section id="hero-container">
        <div class="hero-overlay">
            <h1>Pure Nutrition <br>For Every Paw.</h1>
            <p>Scientifically formulated, organic ingredients for a longer, happier life with your best friend.</p>
        </div>
    </section>

    <h2 class="section-title">Our Premium Blends</h2>
    <div id="product-grid">
        <!-- Products injected here -->
    </div>

    <div id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <div id="checkout-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; font-family: 'Playfair Display', serif;">Shipping Details</h2>
            <form id="order-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="cust_name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="cust_email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" id="cust_address" required placeholder="123 Dog Lane, Pet City">
                </div>
                <button type="submit" class="submit-order-btn">Complete Purchase</button>
                <button type="button" onclick="closeCheckout()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:#888;">Cancel</button>
            </form>
        </div>
    </div>

    <div id="notification">Order placed successfully! 🐾</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 3D HERO SCENE ---
        const initScene = () => {
            const container = document.getElementById('hero-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // The "Bag" (Represented by a rounded box)
            const geometry = new THREE.BoxGeometry(2, 3, 1);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x8B5E3C, 
                roughness: 0.7, 
                metalness: 0.1 
            });
            const bag = new THREE.Mesh(geometry, material);
            scene.add(bag);

            // Kibble Particles
            const particlesGeometry = new THREE.SphereGeometry(0.05, 8, 8);
            const particlesMaterial = new THREE.MeshStandardMaterial({ color: 0xCD853F });
            const particles = [];
            for(let i = 0; i < 50; i++) {
                const p = new THREE.Mesh(particlesGeometry, particlesMaterial);
                p.position.set(
                    (Math.random() - 0.5) * 6,
                    (Math.random() - 0.5) * 6,
                    (Math.random() - 0.5) * 6
                );
                p.userData = { 
                    speed: Math.random() * 0.02 + 0.01, 
                    rotX: Math.random() * 0.02, 
                    rotY: Math.random() * 0.02 
                };
                scene.add(p);
                particles.push(p);
            }

            camera.position.z = 6;

            function animate() {
                requestAnimationFrame(animate);
                bag.rotation.y += 0.01;
                
                particles.forEach(p => {
                    p.position.y += p.userData.speed;
                    p.rotation.x += p.userData.rotX;
                    p.rotation.y += p.userData.rotY;
                    if(p.position.y > 4) p.position.y = -4;
                });

                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            animate();
        };
        initScene();
    </script>

    <script>
        // --- CONFIG & STATE ---
        const API_URL = 'https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1';
        const API_KEY = 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3';
        const HEADERS = {
            'apikey': API_KEY,
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        let cart = JSON.parse(localStorage.getItem('pawnutri_cart')) || [];

        // --- PRODUCT FETCHING ---
        async function fetchProducts() {
            try {
                const response = await fetch(`${API_URL}/products`, { headers: { 'apikey': API_KEY } });
                const products = await response.json();
                renderProducts(products);
            } catch (err) {
                console.error("Error fetching products:", err);
                document.getElementById('product-grid').innerHTML = `<p style="text-align:center; grid-column: 1/-1">Unable to load products. Please try again later.</p>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div>
                        <h3>${p.name}</h3>
                        <p>${p.description}</p>
                    </div>
                    <div>
                        <div class="product-price">$${p.price.toFixed(2)}</div>
                        <button class="add-btn" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // --- CART LOGIC ---
        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            updateCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('pawnutri_cart', JSON.stringify(cart));
            const itemsContainer = document.getElementById('cart-items');
            const countEl = document.getElementById('cart-count');
            const totalEl = document.getElementById('cart-total');

            let total = 0;
            let count = 0;

            itemsContainer.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                count += item.qty;
                return `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>$${item.price.toFixed(2)} each</small>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');

            countEl.innerText = count;
            totalEl.innerText = `$${total.toFixed(2)}`;
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        // --- CHECKOUT & SUBMISSION ---
        function openCheckout() {
            if (cart.length === 0) return alert("Your cart is empty!");
            document.getElementById('checkout-modal').style.display = 'flex';
        }

        function closeCheckout() {
            document.getElementById('checkout-modal').style.display = 'none';
        }

        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('cust_name').value;
            const email = document.getElementById('cust_email').value;
            const address = document.getElementById('cust_address').value;
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            try {
                // 1. Create Order
                const orderRes = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify({
                        customer_name: name,
                        customer_email: email,
                        customer_address: address,
                        total: total
                    })
                });
                const orderData = await orderRes.json();
                const orderId = orderData[0].id;

                // 2. Create Order Items
                const orderItems = cart.map(item => ({
                    order_id: orderId,
                    product_id: item.id,
                    quantity: item.qty,
                    price: item.price
                }));

                await fetch(`${API_URL}/order_items`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify(orderItems)
                });

                // Success
                cart = [];
                updateCart();
                closeCheckout();
                toggleCart();
                showNotification();
                document.getElementById('order-form').reset();

            } catch (err) {
                console.error("Order failed:", err);
                alert("Something went wrong with your order. Please try again.");
            }
        });

        function showNotification() {
            const note = document.getElementById('notification');
            note.style.display = 'block';
            setTimeout(() => note.style.display = 'none', 3000);
        }

        // Init
        fetchProducts();
        updateCart();
    </script>
</body>
</html>
