<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawNutri | Premium Canine Nutrition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-brown: #5D4037;
            --accent-gold: #C5A059;
            --cream-bg: #FDFBF7;
        }
        body {
            background-color: var(--cream-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--primary-brown);
        }
        #hero-canvas {
            width: 100%;
            height: 500px;
            cursor: grab;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #C5A059 0%, #B08D48 100%);
        }
        .cart-sidebar {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        .cart-sidebar.open {
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-amber-900">PawNutri</h1>
        <button onclick="toggleCart()" class="relative p-2 bg-white rounded-full shadow-md hover:bg-amber-50 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13H5.4 5M7 13l-2.1 10H18l-2.1-10M11 13l-2-10M14 13l-2-10" />
            </svg>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-amber-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
        </button>
    </nav>

    <!-- Hero Section -->
    <section class="relative w-full overflow-hidden">
        <div id="hero-canvas"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none w-full px-4">
            <h2 class="text-5xl md:text-7xl font-extrabold text-amber-900 drop-shadow-sm mb-4">Pure Nutrition.<br>Happy Tails.</h2>
            <p class="text-xl text-amber-800 font-medium mb-8">Scientifically formulated, naturally sourced.</p>
            <a href="#products" class="gold-gradient text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg hover:scale-105 transition-transform inline-block pointer-events-auto">Shop Now</a>
        </div>
    </section>

    <!-- Product Grid -->
    <main id="products" class="max-w-7xl mx-auto px-6 py-20">
        <h3 class="text-3xl font-bold text-center mb-12">Our Premium Blends</h3>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Loaded via JS -->
            <div class="col-span-full text-center py-10 text-amber-700">Loading our finest kibble...</div>
        </div>
    </main>

    <!-- Shopping Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-50 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Your Basket</h2>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-black">✕ Close</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="border-t pt-6 mt-6">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="showCheckout()" class="w-full gold-gradient text-white py-4 rounded-lg font-bold text-lg">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full relative">
            <button onclick="hideCheckout()" class="absolute top-4 right-4 text-gray-400">✕</button>
            <h2 class="text-2xl font-bold mb-6">Delivery Details</h2>
            <form id="checkout-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Full Name</label>
                    <input type="text" name="customer_name" required class="w-full p-2 border rounded focus:ring-2 ring-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Email Address</label>
                    <input type="email" name="customer_email" required class="w-full p-2 border rounded focus:ring-2 ring-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Shipping Address</label>
                    <textarea name="customer_address" required class="w-full p-2 border rounded focus:ring-2 ring-amber-500 outline-none"></textarea>
                </div>
                <button type="submit" class="w-full gold-gradient text-white py-3 rounded-lg font-bold">Complete Purchase</button>
            </form>
        </div>
    </div>

    <!-- Confirmation Overlay -->
    <div id="confirm-overlay" class="fixed inset-0 bg-amber-900/95 hidden z-[70] flex items-center justify-center text-center p-4 text-white">
        <div>
            <div class="text-6xl mb-4">🐶</div>
            <h2 class="text-4xl font-bold mb-2">Order Confirmed!</h2>
            <p class="text-xl mb-8">Your pup's favorite meals are on the way.</p>
            <button onclick="location.reload()" class="bg-white text-amber-900 px-8 py-3 rounded-full font-bold">Back to Shop</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kofyaexiiibbuqkpwwwz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3';
        const HEADERS = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        // --- Three.js Logic ---
        function initThree() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / 500, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, 500);
            document.getElementById('hero-canvas').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffd700, 1);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Dog Food Bag (Proxy: Cylinder)
            const bagGeo = new THREE.CylinderGeometry(1, 1, 2.5, 32);
            const bagMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.3 });
            const bag = new THREE.Mesh(bagGeo, bagMat);
            scene.add(bag);

            // Kibbles (Floating spheres)
            const kibbles = [];
            const kibbleGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const kibbleMat = new THREE.MeshStandardMaterial({ color: 0xCD853F });
            for(let i=0; i<40; i++) {
                const k = new THREE.Mesh(kibbleGeo, kibbleMat);
                k.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                k.userData = { speed: Math.random() * 0.02 };
                scene.add(k);
                kibbles.push(k);
            }

            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                bag.rotation.y += 0.01;
                kibbles.forEach(k => {
                    k.position.y += Math.sin(Date.now() * 0.001 + k.position.x) * 0.01;
                    k.rotation.x += 0.01;
                });
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / 500;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, 500);
            });
        }

        // --- Ecommerce Logic ---
        let cart = JSON.parse(localStorage.getItem('pawnutri_cart')) || [];

        async function fetchProducts() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/products`, { headers: HEADERS });
                const data = await res.json();
                renderProducts(data);
            } catch (e) {
                document.getElementById('product-grid').innerHTML = `<p class="col-span-full text-center text-red-500">Error loading products.</p>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-amber-100 hover:shadow-xl transition-all group">
                    <div class="h-48 bg-amber-50 rounded-xl mb-4 flex items-center justify-center text-4xl">📦</div>
                    <h4 class="text-xl font-bold mb-2">${p.name}</h4>
                    <p class="text-gray-600 mb-4 text-sm">${p.description || 'Premium nutrient-dense blend for all life stages.'}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-bold text-amber-900">$${p.price}</span>
                        <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})" class="gold-gradient text-white px-4 py-2 rounded-lg font-medium hover:scale-105 transition">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('pawnutri_cart', JSON.stringify(cart));
            const itemsDiv = document.getElementById('cart-items');
            const countSpan = document.getElementById('cart-count');
            const totalSpan = document.getElementById('cart-total');
            
            countSpan.innerText = cart.reduce((sum, i) => sum + i.qty, 0);
            
            itemsDiv.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-amber-50 p-3 rounded-lg">
                    <div>
                        <div class="font-bold">${item.name}</div>
                        <div class="text-sm text-gray-500">$${item.price} each</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty(${index}, -1)" class="w-6 h-6 bg-white rounded border">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty(${index}, 1)" class="w-6 h-6 bg-white rounded border">+</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            totalSpan.innerText = `$${total.toFixed(2)}`;
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        function showCheckout() {
            if (cart.length === 0) return alert('Your cart is empty!');
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function hideCheckout() {
            document.getElementById('checkout-modal').classList.add('hidden');
        }

        document.getElementById('checkout-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const customerData = {
                customer_name: formData.get('customer_name'),
                customer_email: formData.get('customer_email'),
                customer_address: formData.get('customer_address'),
                total_amount: cart.reduce((sum, i) => sum + (i.price * i.qty), 0)
            };

            try {
                // 1. Create Order
                const orderRes = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify(customerData)
                });
                const order = await orderRes.json();
                const orderId = order.id;

                // 2. Create Order Items
                const itemsData = cart.map(i => ({
                    order_id: orderId,
                    product_id: i.id,
                    quantity: i.qty,
                    unit_price: i.price
                }));

                await fetch(`${SUPABASE_URL}/rest/v1/order_items`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify(itemsData) // Supabase accepts array for bulk insert
                });

                cart = [];
                updateCart();
                hideCheckout();
                document.getElementById('confirm-overlay').classList.remove('hidden');
            } catch (err) {
                alert('Something went wrong with your order. Please try again.');
            }
        };

        // Init
        window.onload = () => {
            initThree();
            fetchProducts();
            updateCart();
        };
    </script>
</body>
</html>
