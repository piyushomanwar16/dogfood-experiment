<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawNutri | Premium Canine Nutrition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5E3C;
            --secondary: #D4A373;
            --accent: #FAEDCD;
            --dark: #432818;
            --light: #FEFAE0;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--light); 
            color: var(--dark); 
            overflow-x: hidden;
        }

        /* Header & Nav */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(254, 250, 224, 0.8);
            backdrop-filter: blur(10px);
        }
        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 700;
        }
        .cart-trigger {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-trigger:hover { background: var(--dark); transform: scale(1.05); }

        /* Hero Section */
        #hero {
            height: 100vh;
            width: 100%;
            position: relative;
            background: radial-gradient(circle, var(--accent) 0%, var(--light) 100%);
        }
        .hero-content {
            position: absolute;
            top: 50%; left: 10%;
            transform: translateY(-50%);
            z-index: 10;
            max-width: 500px;
            pointer-events: none;
        }
        .hero-content h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 4rem; 
            color: var(--dark); 
            line-height: 1.1; 
            margin-bottom: 1rem;
        }
        .hero-content p { font-size: 1.1rem; color: var(--primary); margin-bottom: 2rem; }

        /* Product Section */
        .section-title { 
            text-align: center; 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            margin: 4rem 0 2rem; 
        }
        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 0 5% 5rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .product-card {
            background: var(--white);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: var(--transition);
            border: 1px solid rgba(139, 94, 60, 0.1);
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .product-card h3 { margin-bottom: 0.5rem; color: var(--dark); }
        .product-card p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; height: 40px; }
        .product-price { font-size: 1.5rem; font-weight: 600; color: var(--primary); margin-bottom: 1.5rem; }
        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            width: 100%;
        }
        .add-btn:hover { background: var(--dark); }

        /* Cart Sidebar */
        #cart-sidebar {
            position: fixed;
            top: 0; right: -400px;
            width: 400px; height: 100vh;
            background: var(--white);
            z-index: 2000;
            transition: var(--transition);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }
        #cart-sidebar.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .close-cart { cursor: pointer; font-size: 1.5rem; background: none; border: none; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 25px; height: 25px; border-radius: 50%; border: 1px solid var(--primary); background: none; cursor: pointer; }
        .cart-total { margin-top: 2rem; font-size: 1.3rem; font-weight: 600; text-align: right; }
        .checkout-btn {
            margin-top: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        /* Checkout Modal */
        #checkout-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }
        .submit-order-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Notifications */
        #toast {
            position: fixed;
            bottom: 20px; right: 20px;
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            transform: translateY(100px);
            transition: var(--transition);
            z-index: 4000;
        }
        #toast.show { transform: translateY(0); }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            #cart-sidebar { width: 100%; right: -100%; }
            .hero-content { left: 5%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">PawNutri</a>
        <button class="cart-trigger" onclick="toggleCart()">
            🛒 Cart (<span id="cart-count">0</span>)
        </button>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h1>Pure Nutrition.<br>Pure Love.</h1>
            <p>Scientifically formulated premium dog food crafted for longevity, vitality, and a shiny coat.</p>
        </div>
    </section>

    <h2 class="section-title">Our Premium Blends</h2>
    <div id="product-grid">
        <!-- Products loaded via JS -->
    </div>

    <div id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-total">Total: $<span id="cart-total-amount">0.00</span></div>
        <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
    </div>

    <div id="checkout-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem; font-family: 'Playfair Display', serif;">Shipping Details</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="customer_name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="customer_email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" name="customer_address" required placeholder="123 Pet Lane, Dog City">
                </div>
                <button type="submit" class="submit-order-btn" id="submit-btn">Complete Purchase</button>
                <button type="button" onclick="closeCheckout()" style="width: 100%; background: none; border: none; margin-top: 10px; cursor: pointer; color: #666;">Cancel</button>
            </form>
        </div>
    </div>

    <div id="toast">Order successfully placed! 🐾</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://kofyaexiiibbuqkpwwwz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3';
        const HEADERS = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        // --- 3D SCENE ---
        function init3D() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('hero').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const spotLight = new THREE.SpotLight(0xffd700, 1);
            spotLight.position.set(5, 5, 5);
            scene.add(spotLight);

            // Bag Mesh (Represented as a stylized rounded box)
            const geometry = new THREE.BoxGeometry(2, 3, 1);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x8B5E3C, 
                roughness: 0.3, 
                metalness: 0.1 
            });
            const bag = new THREE.Mesh(geometry, material);
            scene.add(bag);

            // Floating Kibble Particles
            const particles = [];
            const particleGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const particleMat = new THREE.MeshStandardMaterial({ color: 0xCD853F });
            
            for(let i=0; i<50; i++) {
                const p = new THREE.Mesh(particleGeo, particleMat);
                p.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                p.userData = { speed: Math.random() * 0.02 };
                scene.add(p);
                particles.push(p);
            }

            camera.position.z = 6;

            function animate() {
                requestAnimationFrame(animate);
                bag.rotation.y += 0.005;
                bag.rotation.x = Math.sin(Date.now() * 0.001) * 0.1;
                
                particles.forEach(p => {
                    p.position.y += p.userData.speed;
                    if(p.position.y > 5) p.position.y = -5;
                });

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- ECOMMERCE LOGIC ---
        let cart = JSON.parse(localStorage.getItem('pawnutri_cart')) || [];

        async function fetchProducts() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                    headers: HEADERS
                });
                const products = await response.json();
                renderProducts(products);
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('product-grid').innerHTML = "<p>Error loading products. Please try again later.</p>";
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <p>${p.description || 'Premium organic blend for healthy growth.'}</p>
                    <div class="product-price">$${parseFloat(p.price).toFixed(2)}</div>
                    <button class="add-btn" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
                </div>
            `).join('');
        }

        window.addToCart = (id, name, price) => {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            updateCart();
            showToast("Added to cart! 🐶");
        };

        window.updateCart = () => {
            localStorage.setItem('pawnutri_cart', JSON.stringify(cart));
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            document.getElementById('cart-count').innerText = count;

            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:600">${item.name}</div>
                        <div style="font-size:0.8rem">$${item.price}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            document.getElementById('cart-total-amount').innerText = total.toFixed(2);
        };

        window.changeQty = (index, delta) => {
            cart[index].qty += delta;
            if (cart[index].qty < 1) cart.splice(index, 1);
            updateCart();
        };

        window.toggleCart = () => {
            document.getElementById('cart-sidebar').classList.toggle('active');
        };

        window.openCheckout = () => {
            if (cart.length === 0) return alert("Your cart is empty!");
            document.getElementById('checkout-modal').style.display = 'flex';
        };

        window.closeCheckout = () => {
            document.getElementById('checkout-modal').style.display = 'none';
        };

        async function submitOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const formData = new FormData(e.target);
            
            btn.disabled = true;
            btn.innerText = "Processing...";

            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            
            try {
                // 1. Create Order
                const orderRes = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify({
                        customer_name: formData.get('customer_name'),
                        customer_email: formData.get('customer_email'),
                        customer_address: formData.get('customer_address'),
                        total: total
                    })
                });
                const orderData = await orderRes.json();
                const orderId = orderData.id;

                // 2. Create Order Items
                const orderItems = cart.map(item => ({
                    order_id: orderId,
                    product_id: item.id,
                    quantity: item.qty,
                    price: item.price
                }));

                await fetch(`${SUPABASE_URL}/rest/v1/order_items`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify(orderItems)
                });

                // Success
                cart = [];
                updateCart();
                closeCheckout();
                showToast("Order placed successfully! 🐾");
                e.target.reset();
            } catch (err) {
                alert("Order failed. Please check your connection.");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "Complete Purchase";
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Initialize
        document.getElementById('checkout-form').addEventListener('submit', submitOrder);
        init3D();
        fetchProducts();
        updateCart();

    </script>
</body>
</html>
