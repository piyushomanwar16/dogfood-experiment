<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PawNutri – Premium Dog Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    :root {
        --bg: #faf8f5;
        --primary: #8b5e3c;   /* warm brown */
        --secondary: #d4af37; /* gold */
        --accent: #f5deb3;    /* wheat/cream */
        --text: #333;
        --muted: #666;
        --border: #e2d8d0;
        --radius: 8px;
        --transition: .3s ease;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
        background: var(--primary);
        color: #fff;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    header h1 { font-size: 1.8rem; }
    .cart-icon { position: relative; cursor: pointer; font-size: 1.5rem; }
    .cart-badge {
        position: absolute; top:-8px; right:-8px;
        background: var(--secondary); color:#fff;
        border-radius:50%; padding:2px 6px; font-size:.75rem;
    }
    main { padding: 2rem; max-width:1200px; margin:auto; }
    .hero { position:relative; height:500px; margin-bottom:2rem; overflow:hidden; border-radius:var(--radius); box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .hero canvas { display:block; width:100%; height:100%; }
    .products { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:1.5rem; }
    .product-card {
        background:#fff; border:1px solid var(--border);
        border-radius:var(--radius); padding:1rem; text-align:center;
        transition:var(--transition);
        box-shadow:0 2px 6px rgba(0,0,0,.05);
    }
    .product-card:hover { transform:translateY(-4px); box-shadow:0 6px 14px rgba(0,0,0,.1); }
    .product-card img { max-width:100%; height:180px; object-fit:contain; margin-bottom:1rem; }
    .product-card h3 { margin:0.5rem 0; font-size:1.2rem; color:var(--primary); }
    .product-card p { color:var(--muted); font-size:.9rem; margin-bottom:1rem; min-height:3.6rem; }
    .product-card .price { font-weight:bold; font-size:1.1rem; color:var(--secondary); margin-bottom:1rem; }
    .product-card button {
        background:var(--primary); color:#fff; border:none;
        padding:.75rem 1.5rem; border-radius:var(--radius);
        cursor:pointer; font-size:1rem; transition:var(--transition);
    }
    .product-card button:hover { background:var(--secondary); color:#fff; }
    /* Cart Sidebar */
    #cart-sidebar {
        position:fixed; top:0; right:-360px; width:360px; height:100vh;
        background:#fff; box-shadow:-4px 0 12px rgba(0,0,0,.15);
        padding:1.5rem; transition:right var(--transition);
        overflow-y:auto; z-index:1000;
    }
    #cart-sidebar.open { right:0; }
    #cart-sidebar h2 { margin-top:0; color:var(--primary); font-size:1.5rem; }
    .cart-item {
        display:flex; align-items:center; justify-content:space-between;
        padding:.75rem 0; border-bottom:1px solid var(--border);
    }
    .cart-item-info { flex:1; }
    .cart-item-info h4 { margin:0 0 .25rem; font-size:1rem; }
    .cart-item-controls {
        display:flex; align-items:center; gap:.5rem;
    }
    .cart-item-controls button {
        background:none; border:1px solid var(--border);
        border-radius:4px; width:28px; height:28px;
        cursor:pointer; font-size:.9rem; color:var(--primary);
    }
    .cart-item-controls button:hover { background:var(--border); }
    .cart-total { margin-top:1.5rem; text-align:right; font-size:1.2rem; font-weight:bold; }
    .cart-total span { color:var(--secondary); }
    .cart-actions { margin-top:1.5rem; display:flex; gap:.75rem; }
    .cart-actions button {
        flex:1; padding:.75rem; border:none; border-radius:var(--radius);
        cursor:pointer; font-size:1rem; transition:var(--transition);
    }
    .cart-actions .checkout { background:var(--primary); color:#fff; }
    .cart-actions .checkout:hover { background:var(--secondary); }
    .cart-actions .clear { background:var(--muted); color:#fff; }
    .cart-actions .clear:hover { background:#555; }
    /* Checkout Modal */
    #checkout-modal {
        display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
        align-items:center; justify-content:center; z-index:1100;
    }
    #checkout-modal.open { display:flex; }
    #checkout-modal .content {
        background:#fff; padding:2rem; border-radius:var(--radius);
        width:90%; max-width:400px; position:relative;
    }
    #checkout-modal .content h2 { margin-top:0; color:var(--primary); }
    #checkout-modal .content label { display:block; margin-top:1rem; font-weight:600; }
    #checkout-modal .content input {
        width:100%; padding:.5rem; margin-top:.25rem; border:1px solid var(--border);
        border-radius:4px; font-size:1rem;
    }
    #checkout-modal .content button {
        margin-top:1.5rem; width:100%; padding:.75rem;
        background:var(--primary); color:#fff; border:none;
        border-radius:var(--radius); cursor:pointer; font-size:1rem;
    }
    #checkout-modal .content button:hover { background:var(--secondary); }
    #checkout-modal .close { position:absolute; top:.5rem; right:.5rem; background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--muted); }
    /* Confirmation */
    #confirmation {
        display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
        align-items:center; justify-content:center; z-index:1200;
        color:#fff; text-align:center; padding:2rem;
    }
    #confirmation.open { display:flex; }
    #confirmation .content { background:rgba(0,0,0,.7); padding:2.5rem; border-radius:var(--radius); }
    #confirmation .content h2 { margin-top:0; }
    #confirmation .content p { margin:1.5rem 0; }
    #confirmation .content button {
        background:var(--primary); color:#fff; border:none;
        padding:.75rem 1.5rem; border-radius:var(--radius); cursor:pointer;
    }
    #confirmation .content button:hover { background:var(--secondary); }
    /* Responsive */
    @media (max-width:768px) {
        header { flex-direction:column; gap:1rem; }
        .hero { height:350px; }
        #cart-sidebar { width:280px; }
    }
</style>
</head>
<body>

<header>
    <h1>PawNutri</h1>
    <div>
        <span class="cart-icon" id="cartToggle">🛒</span>
        <span class="cart-badge" id="cartBadge">0</span>
    </div>
</header>

<main>
    <!-- Hero 3D Scene -->
    <section class="hero" id="hero"></section>

    <!-- Product Catalog -->
    <section>
        <h2 style="text-align:center; margin-bottom:1.5rem; color:var(--primary);">Our Products</h2>
        <div class="products" id="productList"></div>
    </section>
</main>

<!-- Cart Sidebar -->
<aside id="cart-sidebar">
    <button id="closeCart" style="position:absolute;top:.5rem;right:.5rem;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);">&times;</button>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="cart-total">Total: <span id="cartTotal">$0.00</span></div>
    <div class="cart-actions">
        <button id="checkoutBtn" class="checkout">Checkout</button>
        <button id="clearCartBtn" class="clear">Clear Cart</button>
    </div>
</aside>

<!-- Checkout Modal -->
<div id="checkout-modal">
    <div class="content">
        <button class="close" id="closeCheckout">&times;</button>
        <h2>Checkout</h2>
        <form id="checkoutForm">
            <label>Name<br><input type="text" id="custName" required></label>
            <label>Email<br><input type="email" id="custEmail" required></label>
            <label>Address<br><textarea id="custAddr" rows="3" required></textarea></label>
            <button type="submit">Place Order</button>
        </form>
    </div>
</div>

<!-- Confirmation -->
<div id="confirmation">
    <div class="content">
        <h2>Thank you!</h2>
        <p>Your order has been placed successfully.</p>
        <button id="confirmOk">Continue Shopping</button>
    </div>
</div>

<!-- Import map for Three.js -->
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
}
</script>
<script type="module">
    import * as THREE from 'three';

    // ========== Cart Logic ==========
    const cart = JSON.parse(localStorage.getItem('pawNutriCart') || '[]');
    function saveCart() { localStorage.setItem('pawNutriCart', JSON.stringify(cart)); }
    function renderCartBadge() { document.getElementById('cartBadge').textContent = cart.reduce((sum, i)=> sum + i.quantity, 0); }
    function renderCart() {
        const container = document.getElementById('cartItems');
        if (cart.length===0) {
            container.innerHTML = '<p style="text-align:center;color:var(--muted);">Your cart is empty.</p>';
        } else {
            container.innerHTML = '';
            cart.forEach(item=>{
                const div = document.createElement('div');
                div.className='cart-item';
                div.innerHTML=`
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>$${item.price.toFixed(2)} × ${item.quantity}</p>
                    </div>
                    <div class="cart-item-controls">
                        <button data-id="${item.id}" class="dec">−</button>
                        <span>${item.quantity}</span>
                        <button data-id="${item.id}" class="inc">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        document.getElementById('cartTotal').textContent = `$${cart.reduce((sum,i)=> sum + i.price*i.quantity,0).toFixed(2)}`;
    }
    document.getElementById('cartItems').addEventListener('click', e=>{
        const btn = e.target;
        const id = btn.dataset.id;
        if (!id) return;
        const item = cart.find(i=>i.id==id);
        if (!item) return;
        if (btn.classList.contains('inc')) { item.quantity++; }
        else if (btn.classList.contains('dec')) {
            if (item.quantity>1) item.quantity--;
            else { const idx = cart.indexOf(item); if(idx>-1) cart.splice(idx,1); }
        }
        saveCart();
        renderCart();
        renderCartBadge();
    });
    document.getElementById('cartToggle').addEventListener('click',()=>{ document.getElementById('cart-sidebar').classList.toggle('open'); });
    document.getElementById('closeCart').addEventListener('click',()=>{ document.getElementById('cart-sidebar').classList.remove('open'); });
    document.getElementById('clearCartBtn').addEventListener('click',()=>{ cart.length=0; saveCart(); renderCart(); renderCartBadge(); });

    // ========== Product Fetch ==========
    async function fetchProducts() {
        const resp = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/products',{
            headers:{
                'apikey':'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                'Authorization':'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                'Content-Type':'application/json'
            }
        });
        if (!resp.ok) throw new Error('Failed to fetch products');
        return await resp.json();
    }
    function renderProducts(products){
        const grid = document.getElementById('productList');
        grid.innerHTML='';
        products.forEach(p=>{
            const card = document.createElement('div');
            card.className='product-card';
            // placeholder image using a simple colored square via data URI
            const imgSrc = `data:image/svg+xml,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='%23${((Math.random()*0xffffff)<<0).toString(16).padStart(6,'0')}'/></svg>`)}`;
            card.innerHTML=`
                <img src="${imgSrc}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>${p.description||'Premium dog food.'}</p>
                <div class="price">$${Number(p.price||0).toFixed(2)}</div>
                <button data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">Add to Cart</button>
            `;
            grid.appendChild(card);
        });
        // add to cart listeners
        grid.querySelectorAll('button[data-id]').forEach(btn=>{
            btn.addEventListener('click',()=>{
                const id = btn.dataset.id;
                const name = btn.dataset.name;
                const price = parseFloat(btn.dataset.price);
                const existing = cart.find(i=>i.id==id);
                if (existing) existing.quantity++;
                else cart.push({id,name,price,quantity:1});
                saveCart();
                renderCart();
                renderCartBadge();
            });
        });
    }
    // ========== 3D Hero Scene ==========
    function initThree(){
        const container = document.getElementById('hero');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfaf8f5);
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Lighting
        const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        hemi.position.set(0,5,0);
        scene.add(hemi);
        const dir = new THREE.DirectionalLight(0xffffff, 1);
        dir.position.set(3,5,2);
        scene.add(dir);

        // Dog food bag (simple box)
        const bagGeo = new THREE.BoxGeometry(1.8, 2.5, 0.6);
        const bagMat = new THREE.MeshStandardMaterial({color:0x8b5e3c, roughness:0.6, metalness:0.1});
        const bag = new THREE.Mesh(bagGeo, bagMat);
        bag.position.y = 0.25;
        scene.add(bag);

        // Floating kibble particles
        const particleCount = 80;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for(let i=0;i<particleCount;i++){
            positions[i*3]     = (Math.random()-0.5)*4;
            positions[i*3+1]   = Math.random()*3;
            positions[i*3+2]   = (Math.random()-0.5)*4;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
        const particlesMat = new THREE.PointsMaterial({color:0xd4af37, size:0.02});
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);

        // Animation
        const clock = new THREE.Clock();
        function animate(){
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            bag.rotation.y = t * 0.2;
            // slow drift for particles
            const pos = particlesGeo.attributes.position.array;
            for(let i=0;i<particleCount;i++){
                pos[i*3+1] = Math.sin(t + i)*0.02 + 0.5; // subtle bob
            }
            particlesGeo.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize',()=>{
            const w = container.clientWidth, h = container.clientHeight;
            renderer.setSize(w,h);
            camera.aspect = w/h;
            camera.updateProjectionMatrix();
        });
    }
    // ========== Checkout Logic ==========
    document.getElementById('checkoutBtn').addEventListener('click',()=>{
        document.getElementById('checkout-modal').classList.add('open');
    });
    document.getElementById('closeCheckout').addEventListener('click',()=>{
        document.getElementById('checkout-modal').classList.remove('open');
    });
    document.getElementById('checkoutForm').addEventListener('submit', async e=>{
        e.preventDefault();
        const name = document.getElementById('custName').value.trim();
        const email = document.getElementById('custEmail').value.trim();
        const addr = document.getElementById('custAddr').value.trim();
        if (!name || !email || !addr) { alert('Please fill all fields'); return; }
        const total = cart.reduce((sum,i)=> sum + i.price*i.quantity,0);
        try {
            // 1. Insert order
            const orderResp = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/orders',{
                method:'POST',
                headers:{
                    'apikey':'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Authorization':'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Content-Type':'application/json',
                    'Prefer':'return=representation'
                },
                body:JSON.stringify({customer_name:name, customer_email:email, customer_address:addr, total})
            });
            if (!orderResp.ok) throw new Error('Order insert failed');
            const orderData = await orderResp.json();
            const orderId = orderData[0].id;
            // 2. Insert order items
            const items = cart.map(i=>({
                order_id:orderId,
                product_id:i.id,
                quantity:i.quantity,
                price:i.price
            }));
            const itemsResp = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/order_items',{
                method:'POST',
                headers:{
                    'apikey':'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Authorization':'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Content-Type':'application/json',
                    'Prefer':'return=representation'
                },
                body:JSON.stringify(items)
            });
            if (!itemsResp.ok) throw new Error('Order items insert failed');
            // Success
            cart.length=0;
            saveCart();
            renderCart();
            renderCartBadge();
            document.getElementById('checkout-modal').classList.remove('open');
            document.getElementById('confirmation').classList.add('open');
        }catch(err){
            console.error(err);
            alert('Checkout failed: '+err.message);
        }
    });
    document.getElementById('confirmOk').addEventListener('click',()=>{
        document.getElementById('confirmation').classList.remove('open');
    });

    // ========== Init ==========
    (async()=>{
        try{
            const products = await fetchProducts();
            renderProducts(products);
        }catch(e){
            console.error(e);
            document.getElementById('productList').innerHTML = '<p style="color:red;text-align:center;">Failed to load products.</p>';
        }
        initThree();
        renderCart();
        renderCartBadge();
    })();
</script>
</body>
</html>
