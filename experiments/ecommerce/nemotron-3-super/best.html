<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PawNutri - Premium Dog Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg:#fff8e1;
    --primary:#ffab91;
    --dark:#5d4037;
    --light:#fbe9e7;
    --shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--dark);line-height:1.6}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}
  header{background:var(--primary);color:#fff;padding:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:gap}
  header .logo{font-size:1.5rem;font-weight:bold}
  header .cart{position:relative}
  header .cart-count{position:absolute;top:-8px;right:-8px;background:#fff;color:var(--primary);border-radius:50%;width:18px;height:18px;font-size:0.75rem;display:flex;align-items:center;justify-content:center}
  .hero{position:relative;width:100%;height:60vh;overflow:hidden;background:#f5f5f5}
  .hero canvas{display:block;width:100%;height:100%}
  .products{max-width:1200px;margin:2rem auto;padding:0 1rem}
  .products h2{text-align:center;margin-bottom:1.5rem;color:var(--dark)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem}
  .card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s}
  .card:hover{transform:translateY(-4px)}
  .card img{width:100%;height:180px;object-fit:cover}
  .card-body{padding:1rem}
  .card h3{margin:0 0 .5rem;font-size:1.2rem}
  .card p{margin:0 0 1rem;font-size:.9rem;color:#555}
  .card button{width:100%;background:var(--primary);color:#fff;border:none;padding:.75rem;border-radius:4px;cursor:font-size:1rem}
  .card button:hover{background:#e68a70}
  .cart-section{max-width:400px;margin:2rem auto;padding:1rem;background:#fff;border-radius:8px;box-shadow:var(--shadow)}
  .cart-section h2{text-align:center;margin-bottom:1rem}
  .cart-item{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid #eee}
  .cart-item-info{flex:1}
  .cart-item-quantity{display:flex;align-items:center;gap:.5rem}
  .cart-item-quantity button{background:#eee;border:none;width:24px;height:24px;border-radius:3px;cursor:pointer}
  .cart-total{margin-top:1rem;font-size:1.2rem;text-align:right}
  .checkout-btn{display:block;width:100%;margin-top:1rem;background:var(--primary);color:#fff;border:none;padding:.8rem;border-radius:4px;cursor:pointer;font-size:1rem}
  .checkout-btn:hover{background:#e68a70}
  .checkout-form{display:none;max-width:400px;margin:2rem auto;padding:1.5rem;background:#fff;border-radius:8px;box-shadow:var(--shadow)}
  .checkout-form h2{text-align:center;margin-bottom:1.5rem}
  .checkout-form label{display:block;margin-bottom:.5rem;font-weight:bold}
  .checkout-form input{width:100%;padding:.5rem;margin-bottom:1rem;border:1px solid #ccc;border-radius:4px}
  .checkout-form button{width:100%;background:var(--primary);color:#fff;border:none;padding:.8rem;border-radius:4px;cursor:pointer;font-size:1rem}
  .checkout-form button:hover{background:#e68a70}
  .confirmation{display:none;max-width:400px;margin:2rem auto;padding:2rem;text-align:center;background:#fff;border-radius:8px;box-shadow:var(--shadow)}
  .confirmation h2{color:var(--primary)}
  .confirmation p{margin-top:1rem}
  footer{text-align:center;padding:1.5rem;font-size:.9rem;color:#777}
  @media(max-width:480px){
    header{flex-direction:column;gap:.5rem}
    header .cart{margin-top:.5rem}
  }
</style>
</head>
<body>
<header>
  <div class="logo">PawNutri</div>
  <div>
    <span>Cart:</span>
    <div class="cart" id="cartContainer">
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</header>

<section class="hero">
  <canvas id="heroCanvas"></canvas>
</section>

<section class="products">
  <h2>Our Products</h2>
  <div id="productGrid" class="grid"></div>
</section>

<section class="cart-section" id="cartSection">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <div class="cart-total">Total: <span id="cartTotal">$0.00</span></div>
  <button class="checkout-btn" id="checkoutBtn">Checkout</button>
</section>

<section class="checkout-form" id="checkoutForm">
  <h2>Checkout</h2>
  <form id="orderForm">
    <label for="name">Name:</label>
    <input type="text" id="name" required>
    <label for="email">Email:</label>
    <input type="email" id="email" required>
    <label for="address">Shipping Address:</label>
    <input type="text" id="address" required>
    <button type="submit">Place Order</button>
  </form>
</section>

<section class="confirmation" id="confirmation">
  <h2>Thank You!</h2>
  <p>Your order has been placed successfully. We'll notify you via email.</p>
  <button onclick="location.reload()" style="margin-top:1rem;padding:.5rem 1rem;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;">Continue Shopping</button>
</section>

<footer>
  &copy; <span id="year"></span> PawNutri. All rights reserved.
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const ANON_KEY = 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3';
  const SUPABASE_URL = 'https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1';
  const PRODUCTS_ENDPOINT = `${SUPABASE_URL}/products`;
  const ORDERS_ENDPOINT = `${SUPABASE_URL}/orders`;
  const ORDER_ITEMS_ENDPOINT = `${SUPABASE_URL}/order_items`;

  // Cart handling
  let cart = JSON.parse(localStorage.getItem('pawNutriCart')) || [];

  function saveCart() {
    localStorage.setItem('pawNutriCart', JSON.stringify(cart));
    renderCart();
  }

  function addToCart(product) {
    const existing = cart.find(i => i.id === product.id);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({...product, quantity: 1});
    }
    saveCart();
  }

  function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    saveCart();
  }

  function updateQuantity(id, qty) {
    if (qty <= 0) {
      removeFromCart(id);
      return;
    }
    const item = cart.find(i => i.id === id);
    if (item) item.quantity = qty;
    saveCart();
  }

  function renderCart() {
    const countEl = document.getElementById('cartCount');
    const itemsEl = document.getElementById('cartItems');
    const totalEl = document.getElementById('cartTotal');
    const count = cart.reduce((sum, i) => sum + i.quantity, 0);
    countEl.textContent = count;
    const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    totalEl.textContent = `$${total.toFixed(2)}`;

    if (cart.length === 0) {
      itemsEl.innerHTML = '<p>Your cart is empty.</p>';
      return;
    }
    itemsEl.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-info">
          <strong>${item.name}</strong><br>
          $${item.price.toFixed(2)} × ${item.quantity}
        </div>
        <div>
          <div class="cart-item-quantity">
            <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
            <span>${item.quantity}</span>
            <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
          </div>
          <button onclick="removeFromCart(${item.id})" style="background:#e53935;color:#fff;border:none;padding:2px 6px;border-radius:3px;font-size:0.8rem;cursor:pointer;">Remove</button>
        </div>
      </div>
    `).join('');
  }

  // Product fetching
  async function loadProducts() {
    try {
      const resp = await fetch(PRODUCTS_ENDPOINT, {
        headers: {
          'apikey': ANON_KEY,
          'Authorization': `Bearer ${ANON_KEY}`
        }
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const products = await resp.json();
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${p.image_url || 'https://via.placeholder.com/300x180?text=Dog+Food'}" alt="${p.name}">
          <div class="card-body">
            <h3>${p.name}</h3>
            <p>$${p.price.toFixed(2)}</p>
            <button onclick="addToCart(${JSON.stringify(p).replace(/"/g, '&quot;)})">Add to Cart</button>
          </div>
        `);
        grid.appendChild(card);
      });
    } catch (e) {
      console.error('Failed to load products:', e);
      document.getElementById('productGrid').innerHTML = '<p>Error loading products.</p>';
    }
  }

  // Checkout
  document.getElementById('checkoutBtn').addEventListener('click', () => {
    document.getElementById('checkoutForm').style.display = 'block';
    document.getElementById('cartSection').style'). Actually, we need to hide cartSection hide cart? We'll just show form. We'll just show form.
  });
  document.getElementById('orderForm').addEventListener('submit', async e => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const address = document.getElementById('address').value.trim();
    if (!name || !email || !address) {
      alert('Please fill all fields');
      return;
    }
    try {
      // Create order
      const orderResp = await fetch(ORDERS_ENDPOINT, {
        method: 'POST',
        headers: {
          'apikey': ANON_KEY,
          'Authorization': `Bearer ${ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          customer_name: name,
          customer_email: email,
          shipping_address: address,
          order_date: new Date().toISOString()
        })
      });
      if (!orderResp.ok) throw new Error(`Order failed: ${orderResp.status}`);
      const orderData = await orderResp.json();
      const orderId = orderData[0].id; // supabase returns array

      // Create order items
      const orderItemsPromises = cart.map(item => 
        fetch(ORDER_ITEMS_ENDPOINT, {
          method: 'POST',
          headers: {
            'apikey': ANON_KEY,
            'Authorization': `Bearer ${ANON_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            order_id: orderId,
            product_id: item.id,
            quantity: item.quantity,
            unit_price: item.price
          })
        })
      );
      await Promise.all(orderItemsPromises);

      // Clear cart and show confirmation
      cart = [];
      saveCart();
      document.getElementById('checkoutForm').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
    } catch (err) {
      console.error(err);
      alert('Failed to place order. Please try again.');
    }
  });

  // Three.js hero
  function initThree() {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfff8e1);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.6), 0.1, 1000);
    camera.position.set(0, 2, 5);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('heroCanvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
    renderer.setPixelRatio(window.devicePixelRatio);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffab91, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Dog food bag (simple box)
    const bagGeometry = new THREE.BoxGeometry(1.5, 2, 0.5);
    const bagMaterial = new THREE.MeshStandardMaterial({ color: 0x8d6e63 });
    const bag = new THREE.Mesh(bagGeometry, bagMaterial);
    bag.position.y = 0;
    scene.add(bag);

    // Floating kibble (spheres)
    const kibbleCount = 20;
    const kibbles = [];
    for (let i = 0; i < kibbleCount; i++) {
      const geometry = new THREE.SphereGeometry(0.08, 8, 8);
      const material = new THREE.MeshStandardMaterial({ color: 0xffcc80 });
      const kibble = new THREE.Mesh(geometry, material);
      kibble.position.set(
        (Math.random() - 0.5) * 4,
        Math.random() * 3,
        (Math.random() - 0.5) * 2
      );
      kibble.userData = { speed: 0.01 + Math.random() * 0.02, offsetY: Math.random() * Math.PI * 2 };
      scene.add(kibble);
      kibbles.push(kibble);
    }

    function animate() {
      requestAnimationFrame(animate);
      bag.rotation.y += 0.005;
      kibbles.forEach(k => {
        k.position.y = Math.sin(Date.now() * 0.001 + k.userData.offsetY) * 0.2 + (k.userData.offsetY / Math.PI);
        k.rotation.x += k.userData.speed;
        k.rotation.y += k.userData.speed * 0.5;
      });
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / (window.innerHeight * 0.6);
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
    });
  }
  initThree();

  // Load products and render cart
  loadProducts();
  renderCart();

  // Year in footer
  document.getElementById('year').textContent = new Date().getFullYear();
});
</script>
</body>
</html>
