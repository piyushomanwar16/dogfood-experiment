<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawNutri</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5dc; /* Cream background */
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #8b4513; /* Brown color */
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .product-card {
            background-color: #fff8dc; /* Light cream */
            border: 1px solid #deb887; /* Sandy brown */
            padding: 15px;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .cart {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            background-color: #fff8dc; /* Light cream */
            border: 1px solid #deb887; /* Sandy brown */
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: none;
        }
        .cart.active {
            display: block;
        }
        .checkout-form {
            margin-top: 20px;
        }
        .confirmation {
            text-align: center;
            color: #8b4513; /* Brown color */
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PawNutri</h1>
            <button id="cart-toggle">Cart</button>
        </div>
        <div id="3d-scene"></div>
        <div class="product-grid" id="product-catalog"></div>
        <div class="checkout-form" id="checkout-form">
            <input type="text" id="customer_name" placeholder="Name" required>
            <input type="email" id="customer_email" placeholder="Email" required>
            <input type="text" id="customer_address" placeholder="Address" required>
            <button type="submit">Checkout</button>
        </div>
        <div class="confirmation" id="confirmation"></div>
    </div>

    <div class="cart" id="shopping-cart">
        <h2>Shopping Cart</h2>
        <ul id="cart-items"></ul>
        <p>Total: $<span id="total">0.00</span></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js 3D Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('3d-scene').appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0xffa500 }); // Orange
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Product Catalog
        async function fetchProducts() {
            const response = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/products', {
                headers: {
                    apikey: 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    Authorization: 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3'
                }
            });
            const products = await response.json();
            const productCatalog = document.getElementById('product-catalog');
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p>$${product.price.toFixed(2)}</p>
                    <button data-id="${product.id}">Add to Cart</button>
                `;
                productCatalog.appendChild(card);
            });
        }
        fetchProducts();

        // Shopping Cart
        const cart = document.getElementById('shopping-cart');
        const cartToggle = document.getElementById('cart-toggle');
        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        updateCartDisplay();

        function updateCartDisplay() {
            const cartItemsElement = document.getElementById('cart-items');
            cartItemsElement.innerHTML = '';
            let total = 0;
            cartItems.forEach(item => {
                const li = document.createElement('li');
                li.textContent = `${item.name} - $${item.price.toFixed(2)} x ${item.quantity}`;
                cartItemsElement.appendChild(li);
                total += item.price * item.quantity;
            });
            document.getElementById('total').textContent = total.toFixed(2);
        }

        document.addEventListener('click', e => {
            if (e.target.tagName === 'BUTTON' && e.target.textContent === 'Add to Cart') {
                const productId = e.target.getAttribute('data-id');
                const product = products.find(p => p.id === parseInt(productId));
                const existingItem = cartItems.find(i => i.id === product.id);
                if (existingItem) {
                    existingItem.quantity++;
                } else {
                    cartItems.push({ ...product, quantity: 1 });
                }
                localStorage.setItem('cart', JSON.stringify(cartItems));
                updateCartDisplay();
            }
        });

        cartToggle.addEventListener('click', () => {
            cart.classList.toggle('active');
        });

        // Checkout Form
        const checkoutForm = document.getElementById('checkout-form');
        const confirmation = document.getElementById('confirmation');

        checkoutForm.addEventListener('submit', async e => {
            e.preventDefault();
            const customerName = document.getElementById('customer_name').value;
            const customerEmail = document.getElementById('customer_email').value;
            const customerAddress = document.getElementById('customer_address').value;

            const response = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/orders', {
                method: 'POST',
                headers: {
                    apikey: 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    Authorization: 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    customer_name: customerName,
                    customer_email: customerEmail,
                    customer_address: customerAddress,
                    items: cartItems
                })
            });

            if (response.ok) {
                localStorage.removeItem('cart');
                cartItems = [];
                updateCartDisplay();
                checkoutForm.reset();
                confirmation.textContent = 'Order placed successfully!';
            } else {
                alert('Failed to place order.');
            }
        });
    </script>
</body>
</html>
