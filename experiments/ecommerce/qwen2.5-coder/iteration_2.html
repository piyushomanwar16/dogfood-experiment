<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawNutri</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #fff;
        }
        nav a {
            text-decoration: none;
            color: #333;
            margin-right: 15px;
        }
        .hero {
            position: relative;
            height: 400px;
            background-image: url('https://via.placeholder.com/800x400?text=Hero+Image');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background-color: #fff;
        }
        .product-card img {
            width: 100%;
            height: auto;
        }
        .product-info {
            padding: 15px;
        }
        .product-name, .product-description {
            margin: 0;
        }
        .product-price {
            font-size: 1.2em;
            color: #ff6f61;
        }
        .add-to-cart-btn {
            display: block;
            background-color: #ff6f61;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
        }
        .cart-icon {
            margin-left: auto;
            font-size: 24px;
        }
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .cart-modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 600px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
        }
        .quantity-btn {
            background-color: #f4f4f4;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .cart-total {
            font-size: 1.2em;
            color: #ff6f61;
            margin-top: 15px;
        }
        .checkout-btn {
            display: block;
            background-color: #ff6f61;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About Us</a>
        <a href="#">Contact</a>
    </nav>
    <div class="hero">
        <h1>Welcome to PawNutri</h1>
    </div>
</header>

<div class="product-grid" id="product-grid"></div>

<div class="cart-icon">
    <button onclick="toggleCartModal()">🛒</button>
</div>

<div class="cart-modal" id="cart-modal">
    <div class="cart-modal-content">
        <h2>Shopping Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total">Total: $<span id="total">0.00</span></div>
        <button class="checkout-btn" onclick="submitOrder()">Checkout</button>
    </div>
</div>

<footer>
    &copy; 2023 PawNutri. All rights reserved.
</footer>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0;

    function fetchProducts() {
        fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/products', {
            headers: {
                'apikey': 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                'Authorization': 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            }
        })
        .then(response => response.json())
        .then(data => {
            const productGrid = document.getElementById('product-grid');
            data.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="Product">
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-description">${product.description}</p>
                        <span class="product-price">$${product.price.toFixed(2)}</span>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id}, ${product.price})">Add to Cart</button>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        })
        .catch(error => console.error('Error fetching products:', error));
    }

    function addToCart(productId, price) {
        const item = cart.find(item => item.productId === productId);
        if (item) {
            item.quantity++;
        } else {
            cart.push({ productId, quantity: 1, price });
        }
        updateCartModal();
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function updateCartModal() {
        const cartItems = document.getElementById('cart-items');
        cartItems.innerHTML = '';
        total = 0;
        cart.forEach(item => {
            const itemElement = document.createElement('div');
            itemElement.className = 'cart-item';
            itemElement.innerHTML = `
                <span>${item.quantity} x ${item.price.toFixed(2)}</span>
                <button onclick="removeFromCart(${item.productId})">Remove</button>
            `;
            cartItems.appendChild(itemElement);
            total += item.quantity * item.price;
        });
        document.getElementById('total').innerText = total.toFixed(2);
    }

    function removeFromCart(productId) {
        const itemIndex = cart.findIndex(item => item.productId === productId);
        if (itemIndex !== -1) {
            cart.splice(itemIndex, 1);
            updateCartModal();
            localStorage.setItem('cart', JSON.stringify(cart));
        }
    }

    function toggleCartModal() {
        const cartModal = document.getElementById('cart-modal');
        cartModal.style.display = cartModal.style.display === 'block' ? 'none' : 'block';
    }

    async function submitOrder() {
        const customerName = prompt('Enter your name:');
        const customerEmail = prompt('Enter your email:');
        const customerAddress = prompt('Enter your address:');

        if (customerName && customerEmail && customerAddress) {
            try {
                const response = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/orders', {
                    method: 'POST',
                    headers: {
                        'apikey': 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                        'Authorization': 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        customer_name: customerName,
                        customer_email: customerEmail,
                        customer_address: customerAddress,
                        total: total
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const orderId = data.id;

                    for (const item of cart) {
                        await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/order_items', {
                            method: 'POST',
                            headers: {
                                'apikey': 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                                'Authorization': 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                                'Content-Type': 'application/json',
                                'Prefer': 'return=representation'
                            },
                            body: JSON.stringify({
                                order_id: orderId,
                                product_id: item.productId,
                                quantity: item.quantity,
                                price: item.price
                            })
                        });
                    }

                    alert('Order submitted successfully!');
                    clearCart();
                } else {
                    alert('Error submitting order. Please try again.');
                }
            } catch (error) {
                console.error('Error submitting order:', error);
                alert('Error submitting order. Please try again.');
            }
        }
    }

    function clearCart() {
        cart.length = 0;
        updateCartModal();
        localStorage.removeItem('cart');
    }

    fetchProducts();

    window.addEventListener('beforeunload', () => {
        localStorage.setItem('cart', JSON.stringify(cart));
    });
</script>

</body>
</html>
