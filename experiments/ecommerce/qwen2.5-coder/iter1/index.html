<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawNutri</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5deb3;
            color: #694b28;
        }
        .hero {
            position: relative;
            width: 100%;
            height: 60vh;
            overflow: hidden;
        }
        .hero canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .catalog {
            padding: 2rem;
        }
        .product {
            display: inline-block;
            margin: 1rem;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: calc(25% - 2rem);
        }
        .cart {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background-color: #fff;
            box-shadow: -4px 0 8px rgba(0, 0, 0, 0.1);
            display: none;
        }
        .cart-open {
            display: block;
        }
        .checkout-form {
            display: none;
        }
        .order-success {
            margin-top: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero" id="hero">
        <canvas id="threejs"></canvas>
    </div>

    <div class="catalog" id="catalog">
        <!-- Products will be fetched and displayed here -->
    </div>

    <button onclick="toggleCart()">Open Cart</button>
    <div class="cart" id="cart">
        <h2>Shopping Cart</h2>
        <ul id="cart-items"></ul>
        <button onclick="checkout()">Checkout</button>
    </div>

    <form class="checkout-form" id="checkout-form">
        <input type="text" name="customer_name" placeholder="Customer Name" required>
        <input type="email" name="customer_email" placeholder="Customer Email" required>
        <input type="text" name="customer_address" placeholder="Customer Address" required>
        <button type="submit">Submit Order</button>
    </form>

    <div class="order-success" id="order-success">
        Thank you for your order!
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('threejs') });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const loader = new GLTFLoader();
        loader.load('path/to/dog_food_bag.glb', function (gltf) {
            scene.add(gltf.scene);
            animate();
        });

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
    <script>
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart').innerHTML = cart.map(item => `
            <li>${item.name} x ${item.quantity} - $${(item.price * item.quantity).toFixed(2)}</li>
        `).join('');

        function toggleCart() {
            const cartElement = document.getElementById('cart');
            cartElement.classList.toggle('cart-open');
        }

        async function fetchProducts() {
            const response = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/products', {
                headers: {
                    'apikey': 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Authorization': 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                }
            });
            const products = await response.json();
            document.getElementById('catalog').innerHTML = products.map(product => `
                <div class="product">
                    <h3>${product.name}</h3>
                    <p>${product.description}</p>
                    <p>$${product.price}</p>
                    <button onclick="addToCart(${JSON.stringify(product)})">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(product) {
            const existingItem = cart.find(item => item.id === product.id);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cart').innerHTML = cart.map(item => `
                <li>${item.name} x ${item.quantity} - $${(item.price * item.quantity).toFixed(2)}</li>
            `).join('');
        }

        async function checkout() {
            const form = document.getElementById('checkout-form');
            const formData = new FormData(form);
            const customer_name = formData.get('customer_name');
            const customer_email = formData.get('customer_email');
            const customer_address = formData.get('customer_address');

            const orderResponse = await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/orders', {
                method: 'POST',
                headers: {
                    'apikey': 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Authorization': 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify({
                    customer_name,
                    customer_email,
                    customer_address
                })
            });

            const order = await orderResponse.json();
            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);

            for (const item of cart) {
                await fetch('https://kofyaexiiibbuqkpwwwz.supabase.co/rest/v1/order_items', {
                    method: 'POST',
                    headers: {
                        'apikey': 'sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                        'Authorization': 'Bearer sb_publishable_HzadVL89uY9sfoBI4XnuHw_aieHtKG3',
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        order_id: order.id,
                        product_id: item.id,
                        quantity: item.quantity,
                        price: item.price
                    })
                });
            }

            localStorage.removeItem('cart');
            document.getElementById('order-success').style.display = 'block';
            document.getElementById('cart').innerHTML = '';
        }

        fetchProducts();
    </script>
</body>
</html>
