<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Dog Food – 3D Landing Page</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#111;}
  #overlay{
    position:absolute;top:0;left:0;width:100vw;height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;color:#fff;text-align:center;z-index:10;
  }
  #overlay h1{
    font-size:2.8rem;margin:0 0 0.5rem;text-shadow:0 2px 4px rgba(0,0,0,0.6);
    letter-spacing:1px;
  }
  #overlay p{
    font-size:1.2rem;margin:0 0 1.5rem;max-width:600px;line-height:1.4;
    text-shadow:0 1px 2px rgba(0,0,0,0.5);
  }
  #overlay button{
    background:#d35400;color:#fff;border:none;padding:0.9rem 2rem;
    font-size:1rem;border-radius:4px;cursor:pointer;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
    transition:background .2s,transform .1s;
    pointer-events:auto;
  }
  #overlay button:hover{background:#e67e22;}
  #overlay button:active{transform:scale(0.97);}
</style>
</head>
<body>
<div id="overlay">
  <h1>Premium Dog Food</h1>
  <p>Naturally crafted kibble made with wholesome ingredients for a happy, healthy pup.</p>
  <button id="shopBtn">Shop Now</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // ----- Three.js setup -----
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0xefd5b5, 0.002); // warm atmospheric fog

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.5, 4);

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // ----- Lights -----
  const ambient = new THREE.AmbientLight(0x404040, 0.6);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffb84d, 1);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  // ----- Dog food bag (cylinder) -----
  const bagGeometry = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 32);
  const bagMaterial = new THREE.MeshStandardMaterial({color:0x8B4513, roughness:0.4, metalness:0.1});
  const bag = new THREE.Mesh(bagGeometry, bagMaterial);
  bag.castShadow = true;
  bag.receiveShadow = true;
  scene.add(bag);

  // ----- Floating kibble (spheres) -----
  const kibbleCount = 40;
  const kibbleGeometry = new THREE.SphereGeometry(0.05, 8, 8);
  const kibbleMaterial = new THREE.MeshStandardMaterial({color:0xD2B48C, roughness:0.5});
  const kibbles = [];

  for(let i=0;i<kibbleCount;i++){
    const kibble = new THREE.Mesh(kibbleGeometry, kibbleMaterial);
    // random position inside a sphere radius 3
    const radius = 2.5 + Math.random()*0.5;
    const phi = Math.random()*Math.PI*2;
    const costheta = Math.random()*2 - 1;
    const theta = Math.acos(costheta);
    kibble.position.set(
      radius*Math.sin(theta)*Math.cos(phi),
      radius*Math.sin(theta)*Math.sin(phi),
      radius*Math.cos(theta)
    );
    // random slow drift velocity
    kibble.userData.velocity = new THREE.Vector3(
      (Math.random()-0.5)*0.004,
      (Math.random()-0.5)*0.004,
      (Math.random()-0.5)*0.004
    );
    kibble.castShadow = true;
    scene.add(kibble);
    kibbles.push(kibble);
  }

  // ----- Animation loop -----
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    // rotate bag slowly
    bag.rotation.y = elapsed * 0.2;

    // update kibble positions with drift and wrap
    kibbles.forEach(k=>{
      k.position.add(k.userData.velocity);
      // simple boundary: if too far, bring back inward
      const dist = k.position.length();
      if(dist > 4){
        // push back toward center
        const dir = k.position.clone().normalize().multiplyScalar(-0.02);
        k.position.add(dir);
      }
    });

    renderer.render(scene, camera);
  }
  animate();

  // ----- Resize handling -----
  window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ----- Button action (demo) -----
  document.getElementById('shopBtn').addEventListener('click',()=>{
    alert('Thank you! In a real shop this would take you to the product page.');
  });
</script>
</body>
</html>
