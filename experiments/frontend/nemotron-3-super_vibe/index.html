<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Dog Food – 3D Landing Page</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#fafafa;font-family:Arial,Helvetica,sans-serif;color:#333;}
  #canvas{display:block;width:100%;height:100%;}
  .overlay{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;pointer-events:none;z-index:10;
    padding:0 1rem;
  }
  .overlay h1{
    font-size:2.8rem;margin:0 0 .5rem;color:#2c3e50;text-shadow:0 2px 4px rgba(0,0,0,.1);
  }
  .overlay p{
    font-size:1.2rem;margin:0 0 1.5rem;color:#555;max-width:600px;
  }
  .overlay button{
    background:#e67e22;color:#fff;border:none;padding:.9rem 2rem;
    font-size:1rem;border-radius:5px;cursor:pointer;transition:background .2s;
    box-shadow:0 4px 6px rgba(0,0,0,.15);
  }
  .overlay button:hover{background:#d35400;}
</style>
</head>
<body>
<div id="canvas"></div>
<div class="overlay">
  <h1>Premium Dog Food</h1>
  <p>Nutritious, tasty, and made with love – the perfect kibble for your furry friend.</p>
  <button id="shopBtn">Shop Now</button>
</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
// ----- Scene setup -----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5dc); // warm beige

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas').appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffebcd, 0.8);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// Fog for atmospheric depth
scene.fog = new THREE.FogExp2(0xf5f5dc, 0.15);

// ----- 3D Objects -----
// Dog food bag (simple box)
const bagGeometry = new THREE.BoxGeometry(1.4, 2.2, 0.6);
const bagMaterial = new THREE.MeshStandardMaterial({
  color: 0x8b4513, // saddle brown
  metalness:0.1,
  roughness:0.6
});
const bag = new THREE.Mesh(bagGeometry, bagMaterial);
bag.position.set(0,0,0);
scene.add(bag);

// Kibble pieces (small spheres)
const kibbleCount = 30;
const kibbleGeometry = new THREE.SphereGeometry(0.08, 8, 8);
const kibbleMaterial = new THREE.MeshStandardMaterial({
  color:0xd2691e, // chocolate
  metalness:0,
  roughness:0.7
});
const kibbles = [];
for(let i=0;i<kibbleCount;i++){
  const kib = new THREE.Mesh(kibbleGeometry.clone(), kibbleMaterial.clone());
  // random position in a sphere radius ~3
  const phi = Math.acos(2*Math.random()-1);
  const theta = 2*Math.PI*Math.random();
  const r = 2.5 + Math.random()*0.5;
  kib.position.set(
    r*Math.sin(phi)*Math.cos(theta),
    r*Math.sin(phi)*Math.sin(theta),
    r*Math.cos(phi)
  );
  // give each a slow drift speed
  kib.userData = {
    speed:0.005+Math.random()*0.01,
    angle:Math.random()*Math.PI*2,
    offset:new THREE.Vector3().copy(kib.position)
  };
  scene.add(kib);
  kibbles.push(kib);
}

// ----- Animation -----
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();

  // rotate bag slowly
  bag.rotation.y = elapsed * 0.2;
  bag.rotation.z = Math.sin(elapsed*0.3)*0.1;

  // animate kibbles floating
  kibbles.forEach(k=>{
    k.position.copy(k.userData.offset);
    k.position.y += Math.sin(elapsed*k.userData.speed + k.userData.angle)*0.02;
    k.position.x += Math.cos(elapsed*k.userData.speed*1.3 + k.userData.angle)*0.015;
    k.rotation.x += k.userData.speed;
    k.rotation.y += k.userData.speed*0.7;
  });

  renderer.render(scene, camera);
}
animate();

// ----- Resize -----
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ----- Button action -----
document.getElementById('shopBtn').addEventListener('click',()=>{
  alert('Thank you! In a real shop this would take you to the product page.');
});
</script>
</body>
</html>
