<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dog Food | 3D Experience</title>
    <style>
        :root {
            --gold: #DAA520;
            --brown: #8B4513;
            --dark-brown: #2C1810;
            --green: #2E8B57;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            outline: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            color: var(--dark-brown);
            padding: 20px;
            box-sizing: border-box;
        }

        .content-box {
            max-width: 600px;
            pointer-events: auto;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #5d3a2a;
        }

        .cta-button {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(45deg, var(--gold), var(--brown));
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
            transition: all 0.3s ease;
            outline: none;
        }

        .cta-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(218, 165, 32, 0.6);
            filter: brightness(1.1);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="content-box">
            <h1>Premium Dog Food</h1>
            <p>Crafted with love. Backed by science.</p>
            <button class="cta-button">Shop Now</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // --- Configuration ---
        const CONFIG = {
            bagSize: { w: 1.5, h: 2.2, d: 0.8 },
            colors: { brown: '#8B4513', gold: '#DAA520', green: '#2E8B57', ground: '#3e7a3e', sky: '#87CEEB' },
            kibbleCount: 60
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = false;
        controls.minDistance = 4;
        controls.maxDistance = 15;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(CONFIG.colors.sky, CONFIG.colors.ground, 0.6);
        scene.add(hemiLight);

        // --- Texture Generation ---
        function createBagTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = CONFIG.colors.brown;
            ctx.fillRect(0, 0, 512, 512);

            // Gold Accent Band
            ctx.fillStyle = CONFIG.colors.gold;
            ctx.fillRect(0, 100, 512, 60);
            ctx.fillRect(0, 350, 512, 60);

            // Green Label
            ctx.fillStyle = CONFIG.colors.green;
            ctx.beginPath();
            ctx.arc(256, 256, 120, 0, Math.PI * 2);
            ctx.fill();

            // Text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px serif';
            ctx.textAlign = 'center';
            ctx.fillText('PREMIUM', 256, 240);
            ctx.fillText('DOG FOOD', 256, 280);

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // --- 3D Objects ---
        
        // Ground Plane
        const groundGeo = new THREE.CircleGeometry(4, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Dog Food Bag
        const bagGeo = new THREE.BoxGeometry(CONFIG.bagSize.w, CONFIG.bagSize.h, CONFIG.bagSize.d);
        const bagMat = new THREE.MeshStandardMaterial({ 
            map: createBagTexture(),
            roughness: 0.4,
            metalness: 0.1
        });
        const bag = new THREE.Mesh(bagGeo, bagMat);
        bag.position.y = CONFIG.bagSize.h / 2;
        bag.castShadow = true;
        scene.add(bag);

        // Kibble (InstancedMesh for performance)
        const kibbleGeo = new THREE.TorusGeometry(0.05, 0.03, 8, 16);
        const kibbleMat = new THREE.MeshStandardMaterial({ color: 0xcc8e35, roughness: 0.7 });
        const kibbleMesh = new THREE.InstancedMesh(kibbleGeo, kibbleMat, CONFIG.kibbleCount);
        kibbleMesh.castShadow = true;
        scene.add(kibbleMesh);

        const kibbleData = [];
        const dummy = new THREE.Object3D();

        for (let i = 0; i < CONFIG.kibbleCount; i++) {
            const radius = 2 + Math.random() * 1.5;
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.1 + Math.random() * 0.2;
            const yOffset = Math.random() * 0.5;
            
            kibbleData.push({ radius, angle, speed, yOffset });
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            requestAnimationFrame(animate);

            // Bag Animation
            bag.rotation.y += 0.3 * delta; // 0.3 rad/s
            bag.position.y = (CONFIG.bagSize.h / 2) + Math.sin(elapsed * 0.5) * 0.05;

            // Kibble Animation
            for (let i = 0; i < CONFIG.kibbleCount; i++) {
                const data = kibbleData[i];
                data.angle += data.speed * delta;

                const x = Math.cos(data.angle) * data.radius;
                const z = Math.sin(data.angle) * data.radius;
                const y = 0.2 + Math.sin(elapsed + i) * 0.1 + data.yOffset;

                dummy.position.set(x, y, z);
                dummy.rotation.set(Math.random(), Math.random(), Math.random());
                dummy.updateMatrix();
                kibbleMesh.setMatrixAt(i, dummy.matrix);
            }
            kibbleMesh.instanceMatrix.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        // --- Responsive Handling ---
        function handleResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            if (width < 768) {
                camera.fov = 50;
                camera.position.set(0, 3, 10);
            } else {
                camera.fov = 45;
                camera.position.set(0, 2, 8);
            }
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        window.addEventListener('resize', handleResize);
        handleResize(); // Initial call

        animate();
    </script>
</body>
</html>
