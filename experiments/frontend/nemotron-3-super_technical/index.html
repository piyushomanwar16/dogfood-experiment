<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Dog Food – 3D Landing Page</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#111;color:#fff;font-family:Arial,Helvetica,sans-serif;}
  #overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;z-index:10;
    text-align:center;
    padding:1rem;
    box-sizing:border-box;
  }
  #overlay *{pointer-events:auto;}
  h1{
    font-family:'Playfair Display',serif;
    font-size:2.5rem;
    font-weight:700;
    color:#2C1810;
    text-shadow:2px 2px 4px rgba(0,0,0,0.6);
    margin:0 0 .5rem;
  }
  h2{
    font-weight:400;
    font-size:1.2rem;
    color:#555;
    margin:0 0 1.5rem;
  }
  .cta{
    display:inline-block;
    padding:.75rem 1.5rem;
    background:linear-gradient(135deg,#DAA520,#8B4513);
    border:none;
    border-radius:.5rem;
    color:#fff;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
    transition:box-shadow .3s ease, transform .2s ease;
  }
  .cta:hover{
    box-shadow:0 6px 12px rgba(0,0,0,0.5);
    transform:translateY(-2px);
  }
  /* Mobile adjustments */
  @media (max-width:600px){
    h1{font-size:2rem;}
    h2{font-size:1rem;}
    .cta{padding:.6rem 1.2rem;font-size:.9rem;}
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="bg"></canvas>
<div id="overlay">
  <h1>PREMIUM DOG FOOD</h1>
  <h2>Crafted with love. Backed by science.</h2>
  <button class="cta">Shop Now</button>
</div>

<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
  import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
  import { RoundedBoxGeometry } from 'https://unpkg.com/three@0.160.0/examples/jsm/geometries/RoundedBoxGeometry.js';

  // ----- Scene, Camera, Renderer -----
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 8);

  const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('bg') });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  // ----- Lights -----
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 7);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  scene.add(dirLight);

  const hemi = new THREE.HemisphereLight(0x87CEEB, 0x3e7a3e, 0.6);
  scene.add(hemi);

  // ----- Ground -----
  const groundGeo = new THREE.CircleGeometry(4, 32);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ----- Dog Food Bag Texture (canvas) -----
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  // Background brown
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Gold stripe top
  ctx.fillStyle = '#DAA520';
  ctx.fillRect(0, 0, canvas.width, 30);
  // Green stripe bottom
  ctx.fillStyle = '#2E8B57';
  ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
  // Text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px "Playfair Display", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PREMIUM DOG FOOD', canvas.width / 2, canvas.height / 2);
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(1, 1);

  // ----- Dog Food Bag -----
  const bagGeo = new RoundedBoxGeometry(1.5, 2.2, 0.8, 0.15, 4);
  const bagMat = new THREE.MeshStandardMaterial({ map: texture });
  const bag = new THREE.Mesh(bagGeo, bagMat);
  bag.castShadow = true;
  bag.receiveShadow = true;
  scene.add(bag);

  // ----- Kibble (InstancedMesh) -----
  const kibbleCount = 40;
  const kibbleGeo = new THREE.SphereGeometry(0.05, 8, 8);
  const kibbleMat = new THREE.MeshStandardMaterial({ color: 0xfff8dc });
  const kibble = new THREE.InstancedMesh(kibbleGeo, kibbleMat, kibbleCount);
  kibble.instanceMatrix.setUsageTHREE.DynamicDrawUsage; // we'll update each frame
  kibble.instanceMatrix.needsUpdate = true;
  scene.add(kibble);

  // Per-instance data
  const kibbleData = [];
  for (let i = 0; i < kibbleCount; i++) {
    const radius = THREE.MathUtils.lerp(2, 3.5, Math.random());
    const speed = THREE.MathUtils.lerp(0.1, 0.3, Math.random());
    const phase = Math.random * Math.PI * 2;
    const yAmp = THREE.MathUtils.lerp(0.01, 0.04, Math.random());
    const ySpeed = THREE.MathUtils.lerp(0.4, 0.8, Math.random());
    const yPhase = Math.random * Math.PI * 2;
    kibbleData.push({ radius, speed, phase, yAmp, ySpeed, yPhase });
    // Initial matrix
    const dummy = new THREE.Object3D();
    dummy.position.set(
      radius * Math.cos(phase),
      0.05 + yAmp * Math.sin(yPhase),
      radius * Math.sin(phase)
    );
    dummy.updateMatrix();
    kibble.setMatrixAt(i, dummy.matrix);
  }
  kibble.instanceMatrix.needsUpdate = true;

  // ----- OrbitControls -----
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 3;
  controls.maxDistance = 15;

  // ----- Resize Handler -----
  function onWindowResize() {
    const isMobile = window.innerWidth <= 600;
    if (isMobile) {
      camera.fov = 50;
      camera.position.set(0, 3, 10);
    } else {
      camera.fov = 45;
      camera.position.set(0, 2, 8);
    }
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  window.addEventListener('resize', onWindowResize);
  onWindowResize(); // initial

  // ----- Animation Loop -----
  const clock = new THREE.Clock();
  function animate() {
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Bag rotation + bob
    bag.rotation.y += 0.3 * delta;
    bag.position.y = 0.05 * Math.sin(Math.PI * elapsed); // amplitude 0.05, freq 0.5

    // Kibble instances
    kibbleData.forEach((data, i) => {
      const angle = data.speed * elapsed + data.phase;
      const x = data.radius * Math.cos(angle);
      const z = data.radius * Math.sin(angle);
      const y = 0.05 + data.yAmp * Math.sin(data.ySpeed * elapsed + data.yPhase);
      const dummy = new THREE.Object3D();
      dummy.position.set(x, y, z);
      dummy.updateMatrix();
      kibble.setMatrixAt(i, dummy.matrix);
    });
    kibble.instanceMatrix.needsUpdate = true;

    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  // ----- Cleanup -----
  window.addEventListener('beforeunload', () => {
    // dispose geometries
    bagGeo.dispose();
    groundGeo.dispose();
    kibbleGeo.dispose();
    // dispose materials
    bagMat.dispose();
    groundMat.dispose();
    kibbleMat.dispose();
    // dispose texture
    texture.dispose();
    // dispose controls
    controls.dispose();
  });
</script>
</body>
</html>
