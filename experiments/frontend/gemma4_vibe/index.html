<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawFeast | Premium Dog Food</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: #fdf5e6;
        }

        canvas {
            display: block;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to 3D scene if needed */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 10%;
            box-sizing: border-box;
            color: #5d4037;
        }

        .content {
            pointer-events: auto;
            max-width: 600px;
            animation: fadeInUp 1.2s ease-out forwards;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            line-height: 1.1;
            color: #8d6e63;
            text-transform: uppercase;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            margin: 20px 0 40px 0;
            color: #795548;
            line-height: 1.6;
        }

        .shop-btn {
            background-color: #ffb74d;
            color: white;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 183, 77, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .shop-btn:hover {
            background-color: #f57c00;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 183, 77, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #ui-layer { align-items: center; padding-left: 0; text-align: center; }
            h1 { font-size: 3rem; }
            .content { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="content">
            <h1>Premium<br>Dog Food</h1>
            <p>Scientifically formulated nutrition crafted with organic ingredients to keep your best friend happy, healthy, and energetic.</p>
            <button class="shop-btn">Shop Now</button>
        </div>
    </div>

    <!-- Import Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfdf5e6);
        scene.fog = new THREE.Fog(0xfdf5e6, 5, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        camera.position.y = 1;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 7.5);
        mainLight.castShadow = true;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0xffb74d, 0.5);
        fillLight.position.set(-5, 2, -2);
        scene.add(fillLight);

        // --- 3D Objects ---

        // 1. The "Bag" (Represented by a rounded box)
        const bagGeometry = new THREE.BoxGeometry(1.5, 2.2, 0.8);
        const bagMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8d6e63, 
            roughness: 0.3, 
            metalness: 0.1 
        });
        const bag = new THREE.Mesh(bagGeometry, bagMaterial);
        bag.castShadow = true;
        bag.position.x = 1.5; // Shift right to make room for text
        scene.add(bag);

        // Add a "label" to the bag
        const labelGeo = new THREE.PlaneGeometry(1.2, 1);
        const labelMat = new THREE.MeshStandardMaterial({ color: 0xffb74d });
        const label = new THREE.Mesh(labelGeo, labelMat);
        label.position.z = 0.41;
        bag.add(label);

        // 2. Floating Kibbles
        const kibbles = [];
        const kibbleGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const kibbleMat = new THREE.MeshStandardMaterial({ color: 0xbc8f8f, roughness: 0.8 });

        for (let i = 0; i < 40; i++) {
            const kibble = new THREE.Mesh(kibbleGeo, kibbleMat);
            
            // Random positions
            kibble.position.set(
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10
            );
            
            // Random rotation
            kibble.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            
            // Custom property for animation
            kibble.userData = {
                speedX: Math.random() * 0.01,
                speedY: Math.random() * 0.01,
                floatOffset: Math.random() * Math.PI * 2
            };
            
            scene.add(kibble);
            kibbles.push(kibble);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // Rotate Bag slowly
            bag.rotation.y += 0.005;
            bag.position.y = Math.sin(time) * 0.2; // Gentle floating

            // Animate Kibbles
            kibbles.forEach((k, i) => {
                k.position.y += Math.sin(time + k.userData.floatOffset) * 0.005;
                k.position.x += Math.cos(time + k.userData.floatOffset) * 0.005;
                k.rotation.x += 0.01;
                k.rotation.z += 0.01;
            });

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
