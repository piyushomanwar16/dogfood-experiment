<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dog Food</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #2C1810;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        #overlay h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        #overlay p {
            font-weight: lighter;
            margin-bottom: 20px;
        }
        #ctaButton {
            padding: 10px 20px;
            border: none;
            color: white;
            border-radius: 5px;
            background: linear-gradient(to right, #DAA520, #8B4513);
            cursor: pointer;
            transition: box-shadow 0.3s ease;
        }
        #ctaButton:hover {
            box-shadow: 0 0 10px rgba(218, 165, 32, 0.7);
        }
    </style>
</head>
<body>
<div id="overlay">
    <h1>PREMIUM DOG FOOD</h1>
    <p>Crafted with love. Backed by science.</p>
    <button id="ctaButton">BUY NOW</button>
</div>
<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const container = document.createElement('div');
    document.body.appendChild(container);

    let camera, scene, renderer;
    let bag, kibbleMesh;
    const kibbleObjects = [];

    init();
    animate();

    function init() {
        // Scene setup
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x3e7a3e, 0.6);
        scene.add(hemisphereLight);

        // Dog food bag
        const bagGeometry = new THREE.BoxGeometry(1.5, 2.2, 0.8);
        const bagMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        bag = new THREE.Mesh(bagGeometry, bagMaterial);
        bag.castShadow = true;
        bag.receiveShadow = false;
        scene.add(bag);

        // Texture
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 24px Arial';
        ctx.fillStyle = '#DAA520';
        ctx.textAlign = 'center';
        ctx.fillText('PREMIUM DOG FOOD', canvas.width / 2, canvas.height / 2 + 10);
        const texture = new THREE.CanvasTexture(canvas);

        // Kibble pieces
        const kibbleGeometry = new THREE.TorusGeometry(0.1, 0.05, 8, 32);
        const kibbleMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
        for (let i = 0; i < 30; i++) {
            const kibble = new THREE.Mesh(kibbleGeometry, kibbleMaterial);
            kibble.position.set(Math.random() * 6 - 3, Math.random() * 2 + 1.5, Math.random() * 6 - 3);
            kibble.castShadow = true;
            kibble.receiveShadow = false;
            kibble.rotation.y = Math.random() * Math.PI * 2;
            scene.add(kibble);
            kibbleObjects.push(kibble);
        }

        // Ground plane
        const groundGeometry = new THREE.CircleGeometry(4, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3e7a3e });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('resize', onWindowResize, false);
    }

    function animate() {
        requestAnimationFrame(animate);

        // Animation for the dog food bag
        bag.rotation.y += 0.3 * 0.016; // 0.3 rad/s
        bag.position.y = 1.5 + Math.sin(Date.now() * 0.5 * 0.016) * 0.05; // Sine wave bobbing

        // Animation for kibble pieces
        kibbleObjects.forEach((kibble, index) => {
            const angle = Date.now() * (0.1 + index * 0.02) * 0.016;
            const radius = 2 + index % 1.5;
            kibble.position.x = Math.cos(angle) * radius;
            kibble.position.z = Math.sin(angle) * radius;
            kibble.rotation.y += 0.3 * 0.016; // Y-axis oscillation
        });

        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        if (window.innerWidth < 768) {
            camera.fov = 50;
            camera.position.set(0, 3, 10);
        } else {
            camera.fov = 45;
            camera.position.set(0, 2, 8);
        }
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Optional touch controls
    if ('ontouchstart' in window) {
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.screenSpacePanning = true;
    }
</script>
</body>
</html>
